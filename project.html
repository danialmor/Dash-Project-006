  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
(function(){
    const PASSWORD = '1405';
    let isAdmin = false;

    // Projects data (stored in localStorage)
    const PROJECTS = ['حمزه','بلوار مهر','بهار آزادی','ملاصدرا','جابرانصاری','آب۲۵۰','فارابی','سجاد','توحید'];
    const DATA_KEY = 'dashboard_project_data';

    function getProjectData(){
        const saved = localStorage.getItem(DATA_KEY);
        if(saved) return JSON.parse(saved);
        return PROJECTS.map(name=>({name, spi:1.0, progress:0, deviation:0}));
    }
    function saveProjectData(data){ localStorage.setItem(DATA_KEY, JSON.stringify(data)); }

    // Date
    const now = new Date();
    const shamsi = new Intl.DateTimeFormat('fa-IR',{year:'numeric',month:'2-digit',day:'2-digit'}).format(now);
    const weekdays = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنج‌شنبه','جمعه','شنبه'];
    document.getElementById('shamsiDate').textContent = shamsi;
    document.getElementById('miladiDate').textContent = now.toLocaleDateString('en-US',{year:'numeric',month:'2-digit',day:'2-digit'});
    document.getElementById('weekday').textContent = weekdays[now.getDay()];

    // Render chart
    function renderChart(){
        const data = getProjectData();
        const maxSpi = Math.max(...data.map(d=>d.spi), 1.2);
        const chart = document.getElementById('spiChart');
        chart.innerHTML = '';
        data.forEach(p=>{
            const pct = Math.min((p.spi / maxSpi) * 100, 100);
            const color = p.spi >= 1 ? '#059669' : p.spi >= 0.8 ? '#d97706' : '#dc2626';
            const row = document.createElement('div');
            row.className = 'flex items-center gap-3';
            row.innerHTML = `
                <span class="w-24 text-xs font-semibold text-slate-700 text-left shrink-0">${p.name}</span>
                <div class="flex-1 h-7 bg-slate-100 rounded-full overflow-hidden relative">
                    <div class="bar-fill h-full rounded-full" style="width:${pct}%;background:${color}"></div>
                    <span class="absolute inset-0 flex items-center justify-center text-xs font-bold" style="color:${pct>40?'#fff':'#333'}">${p.spi.toFixed(2)}</span>
                </div>
            `;
            chart.appendChild(row);
        });
    }

    // Render table
    function renderTable(){
        const data = getProjectData();
        const tbody = document.getElementById('compTable');
        tbody.innerHTML = '';
        // Sort by progress desc
        const sorted = [...data].sort((a,b)=>b.progress - a.progress);
        sorted.forEach((p,i)=>{
            const devColor = p.deviation > 0 ? '#dc2626' : p.deviation < 0 ? '#059669' : '#6b7280';
            const devText = p.deviation > 0 ? `+${p.deviation} روز تأخیر` : p.deviation < 0 ? `${p.deviation} روز جلوتر` : 'طبق برنامه';
            const tr = document.createElement('tr');
            tr.className = 'border-b border-slate-100 hover:bg-slate-50 transition';
            tr.innerHTML = `
                <td class="py-3 px-3 font-semibold text-slate-800">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} ${p.name}</td>
                <td class="py-3 px-3 text-center font-bold" style="color:${p.spi>=1?'#059669':'#dc2626'}">${p.spi.toFixed(2)}</td>
                <td class="py-3 px-3 text-center">
                    <div class="inline-flex items-center gap-2">
                        <div class="w-20 h-2 bg-slate-200 rounded-full overflow-hidden"><div class="h-full rounded-full bg-emerald-500" style="width:${p.progress}%"></div></div>
                        <span class="font-bold text-slate-700">${p.progress}%</span>
                    </div>
                </td>
                <td class="py-3 px-3 text-center font-semibold" style="color:${devColor}">${devText}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Admin edit table
    function renderEditTable(){
        const data = getProjectData();
        const tbody = document.getElementById('compTable');
        tbody.innerHTML = '';
        data.forEach((p,i)=>{
            const tr = document.createElement('tr');
            tr.className = 'border-b border-slate-100';
            tr.innerHTML = `
                <td class="py-2 px-3 font-semibold text-slate-800">${p.name}</td>
                <td class="py-2 px-3 text-center"><input type="number" step="0.01" value="${p.spi}" data-idx="${i}" data-field="spi" class="admin-input w-16 text-center border border-slate-300 rounded-lg py-1 text-sm"></td>
                <td class="py-2 px-3 text-center"><input type="number" step="1" min="0" max="100" value="${p.progress}" data-idx="${i}" data-field="progress" class="admin-input w-16 text-center border border-slate-300 rounded-lg py-1 text-sm"></td>
                <td class="py-2 px-3 text-center"><input type="number" step="1" value="${p.deviation}" data-idx="${i}" data-field="deviation" class="admin-input w-16 text-center border border-slate-300 rounded-lg py-1 text-sm"></td>
            `;
            tbody.appendChild(tr);
        });
        // Save on change
        tbody.querySelectorAll('.admin-input').forEach(input=>{
            input.addEventListener('change', ()=>{
                const d = getProjectData();
                const idx = parseInt(input.dataset.idx);
                const field = input.dataset.field;
                d[idx][field] = parseFloat(input.value) || 0;
                saveProjectData(d);
                renderChart();
            });
        });
    }

    renderChart();
    renderTable();

    // Admin
    const modal = document.getElementById('pwModal');
    const pwInput = document.getElementById('pwInput');
    const pwError = document.getElementById('pwError');

    document.getElementById('adminBtn').addEventListener('click',()=>{
        if(!isAdmin){
            modal.classList.remove('hidden');
            modal.style.display='flex';
            pwInput.value='';
            pwError.classList.add('hidden');
            pwInput.focus();
        } else { exitAdmin(); }
    });
    document.getElementById('pwCancel').addEventListener('click',()=>{ modal.classList.add('hidden'); modal.style.display=''; });
    document.getElementById('pwSubmit').addEventListener('click', tryLogin);
    pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});

    function tryLogin(){
        if(pwInput.value===PASSWORD){ modal.classList.add('hidden'); modal.style.display=''; enterAdmin(); }
        else { pwError.classList.remove('hidden'); }
    }
    function enterAdmin(){
        isAdmin=true;
        document.getElementById('adminBar').classList.remove('hidden');
        document.getElementById('adminBtnLabel').textContent='🔓 خروج';
        renderEditTable();
    }
    function exitAdmin(){
        isAdmin=false;
        document.getElementById('adminBar').classList.add('hidden');
        document.getElementById('adminBtnLabel').textContent='🔒 مدیریت';
        renderTable();
    }
    document.getElementById('adminExit').addEventListener('click', exitAdmin);

    lucide.createIcons();
})();
</script>
